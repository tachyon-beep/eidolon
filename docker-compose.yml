version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: eidolon-pg
    environment:
      POSTGRES_USER: eidolon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eidolon
    ports:
      - "6543:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eidolon"]
      interval: 5s
      timeout: 3s
      retries: 5
